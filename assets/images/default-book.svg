  <line x1="30" y1="15" x2="30" y2="235" stroke="#cbd5e0" stroke-width="2"/>
  
  <!-- Book Icon -->
  <path d="M 70 90 L 130 90 L 130 170 L 70 170 Z" fill="none" stroke="#2d3748" stroke-width="3"/>
  <line x1="70" y1="110" x2="130" y2="110" stroke="#2d3748" stroke-width="2"/>
